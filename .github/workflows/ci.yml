name: Continuous Integration

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-and-push:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Test
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          target: test
          push: false

      - name: Login to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        if: github.event_name == 'push'
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          push: true
          tags: |
            ghcr.io/thenickfish/docker-ai-sbx:latest
            ghcr.io/thenickfish/docker-ai-sbx:${{ github.sha }}

      - name: Install sbx
        if: github.event_name == 'push'
        # run: curl -fsSL https://desktop.docker.com/sbx/install.sh | sh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -fsSL https://get.docker.com -o /tmp/get-docker.sh
          echo "3c2c1f7e9a3552b594b51b52d479a6c7ffdfd7e2d02a59845a0dc60ea9e71f45  /tmp/get-docker.sh" | sha256sum -c
          sudo REPO_ONLY=1 sh /tmp/get-docker.sh
          sudo apt-get install docker-sbx
          echo $GH_TOKEN | sbx login --username ${{ github.actor }} --password-stdin

      - name: Push kit
        if: github.event_name == 'push'
        run: |
          sbx kit validate .
          sbx kit push . ghcr.io/thenickfish/docker-ai-sbx-kit:latest
