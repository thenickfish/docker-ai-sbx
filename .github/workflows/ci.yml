name: Continuous Integration

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-and-push:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Test
        run: |
          PLATFORMS=linux/amd64,linux/arm64 docker buildx bake claude-test \
            --set "claude-test.cache-from=type=gha" \
            --set "claude-test.cache-to=type=gha,mode=max"

      - name: Login to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        if: github.event_name == 'push'
        run: |
          PLATFORMS=linux/amd64,linux/arm64 GIT_SHA=${{ github.sha }} docker buildx bake --push \
            --set "*.cache-from=type=gha" \
            --set "*.cache-to=type=gha,mode=max"

      - name: Install sbx and validate
        # run: curl -fsSL https://desktop.docker.com/sbx/install.sh | sh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git clone --filter=blob:none --sparse https://github.com/docker/docker-install.git /tmp/docker-install
          git -C /tmp/docker-install sparse-checkout set --no-cone install.sh
          # renovate: datasource=git-refs depName=https://github.com/docker/docker-install currentValue=master
          git -C /tmp/docker-install checkout 153e238e1d876160ea4a2a1844ca7f2983bbdd5e
          sudo REPO_ONLY=1 sh /tmp/docker-install/install.sh
          sudo apt-get install docker-sbx
          echo "$GH_TOKEN" | sbx secret set --registry ghcr.io --password-stdin
          sbx kit validate ./claude
          sbx kit validate ./pi

      - name: Push kit
        if: github.event_name == 'push'
        run: |
          sbx kit push ./claude ghcr.io/thenickfish/docker-ai-sbx-claude-kit:latest
          sbx kit push ./claude ghcr.io/thenickfish/docker-ai-sbx-claude-kit:${{ github.sha }}
          
          sbx kit push ./pi ghcr.io/thenickfish/docker-ai-sbx-pi-kit:latest
          sbx kit push ./pi ghcr.io/thenickfish/docker-ai-sbx-pi-kit:${{ github.sha }}
