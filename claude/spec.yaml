# https://docs.docker.com/ai/sandboxes/customize/kits/
schemaVersion: "1"
kind: mixin
name: thenickfish-claude
network:
  allowedDomains:
    - search.devbox.sh
commands:
  startup:
    - command:
        - sh
        - -c
        - |
          dockerd --host=unix:///var/run/docker.sock \
                  --log-level=error \
                  --iptables=false \
                  --bridge=none \
                  > /tmp/dockerd.log 2>&1 &
      user: "0"
      description: Start Docker daemon
    - command:
        - sh
        - -c
        - |
          mkdir -p /home/agent/.claude
          # skipDangerousModePermissionPrompt: intentional — sandbox is an isolated environment
          cat > /home/agent/.claude/settings.json <<'JSON'
          {
            "hooks": {
              "PreToolUse": [
                {
                  "matcher": "Bash",
                  "hooks": [{"type": "command", "command": "rtk hook claude"}]
                }
              ]
            },
            "skipDangerousModePermissionPrompt": true,
            "enabledPlugins": {
              "caveman@caveman": true
            }
          }
          JSON
          rtk init -g --auto-patch
      user: "1000"
      description: Write claude settings.json (rtk hooks + caveman plugin), init rtk globally
